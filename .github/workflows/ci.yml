name: CI/CD - LiciGov Pro

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Testes Automatizados
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'pnpm'
      
      - name: Instalar pnpm
        run: npm install -g pnpm
      
      - name: Instalar dependências
        run: pnpm install
      
      - name: Executar testes
        run: pnpm test
        env:
          CI: true

  security:
    name: Auditoria de Segurança
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
      
      - name: Instalar pnpm
        run: npm install -g pnpm
      
      - name: Auditoria de dependências
        run: pnpm audit --audit-level=high || true
      
      - name: Verificar vulnerabilidades críticas
        run: |
          AUDIT_OUTPUT=$(pnpm audit --json || true)
          CRITICAL=$(echo "$AUDIT_OUTPUT" | grep -o '"critical":[0-9]*' | grep -o '[0-9]*' || echo "0")
          HIGH=$(echo "$AUDIT_OUTPUT" | grep -o '"high":[0-9]*' | grep -o '[0-9]*' || echo "0")
          
          echo "Vulnerabilidades Críticas: $CRITICAL"
          echo "Vulnerabilidades Altas: $HIGH"
          
          if [ "$CRITICAL" -gt "0" ]; then
            echo "❌ Falha: Vulnerabilidades críticas encontradas!"
            exit 1
          fi
          
          echo "✅ Sem vulnerabilidades críticas"

  deploy:
    name: Deploy (Preparação)
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v3
      
      - name: Verificar build
        run: echo "✅ Build verificado - Pronto para deploy"
      
      - name: Preparar artefatos
        run: |
          echo "📦 Preparando artefatos de deploy..."
          echo "✅ Deploy preparado com sucesso"
