name: CI/CD - LiciGov Pro

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Testes Automatizados
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      
      - name: Instalar pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Instalar dependências
        run: pnpm install --frozen-lockfile
      
      - name: Executar testes de auditoria
        run: pnpm test server/services/__tests__/auditCorrections.test.ts
        env:
          CI: true
      
      - name: Verificar TypeScript
        run: pnpm tsc --noEmit
        continue-on-error: true # Permitir continuar mesmo com erros TS (temporário)
      
      - name: Lint
        run: pnpm lint
        continue-on-error: true # Permitir continuar mesmo com erros de lint (temporário)
  
  security:
    name: Auditoria de Segurança
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      
      - name: Instalar pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      
      - name: Instalar dependências
        run: pnpm install --frozen-lockfile
      
      - name: Auditoria de dependências
        run: pnpm audit --audit-level=moderate
        continue-on-error: true
  
  deploy:
    name: Deploy (apenas main)
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      
      - name: Deploy para produção
        run: echo "Deploy automático configurado via Manus Platform"
        # O deploy real é feito pela plataforma Manus
        # Este step é apenas um placeholder para futuras integrações
